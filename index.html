<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD2_JR | System Access</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="overlay"></div>
    
    <div class="terminal">
        <header>
            <h1>SYSTEM BREACH DETECTED</h1>
            <h2 class="access-granted">ACCESS GRANTED</h2>
            <p class="meta">Location: Sverige | Host: Netlify</p>

        <div class="grid">

                <i class="fa-brands fa-discord"></i>
                <h3>COMMUNITY</h3>
                <p>Anslut till vår Discord-server för live-uppdateringar.</p>
                <a href="DIN_DISCORD_LÄNK" target="_blank" class="btn">JOIN SERVER</a>
            </div>

            <div class="card archive">
                <i class="fa-solid fa-database"></i>
                <h3>DATABASE</h3>
                <p>Digitalt arkiv med alla filer och dokument.</p>
                <a href="#" class="btn">OPEN FILES</a>
            </div>
        </div>

        <footer>
            <p class="typing">Connecting to DD2_JR node...</p>
        </footer>
    </div>

</html>
