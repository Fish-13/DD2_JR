<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERRIDE_INITIATED</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        
        #glitch-canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 10; pointer-events: none;
        }

        .system-status {
            position: fixed; top: 20px; left: 20px; color: #0f0; font-size: 12px;
            z-index: 100; text-transform: uppercase; letter-spacing: 2px;
        }

        #main-stage {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; text-align: center; width: 100%;
        }

        .glitch-text {
            color: #fff; font-size: 8vw; font-weight: 900; letter-spacing: -5px;
            position: relative; display: inline-block; opacity: 0;
        }

        .glitch-text::before, .glitch-text::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        .glitch-text::before { left: 2px; text-shadow: -2px 0 #ff00c1; clip: rect(44px, 450px, 56px, 0); animation: gl-1 2s infinite linear alternate-reverse; }
        .glitch-text::after { left: -2px; text-shadow: -2px 0 #00fff9; clip: rect(44px, 450px, 56px, 0); animation: gl-2 3s infinite linear alternate-reverse; }

        @keyframes gl-1 { 
            0% { clip: rect(10px, 9999px, 20px, 0); } 
            100% { clip: rect(80px, 9999px, 90px, 0); } 
        }
        @keyframes gl-2 { 
            0% { clip: rect(50px, 9999px, 60px, 0); } 
            100% { clip: rect(10px, 9999px, 30px, 0); } 
        }

        #final-ui { display: none; opacity: 0; transition: opacity 2s; }
        .cyber-title { color: #fff; font-size: 6rem; text-shadow: 0 0 20px #fff; margin: 0; }
        
        .nav-box { margin-top: 50px; }
        .cyber-btn {
            background: transparent; border: 1px solid #fff; color: #fff;
            padding: 20px 40px; font-size: 1rem; text-transform: uppercase;
            letter-spacing: 5px; cursor: pointer; transition: 0.3s;
            text-decoration: none; display: inline-block; margin: 10px;
        }
        .cyber-btn:hover { background: #fff; color: #000; box-shadow: 0 0 50px rgba(255,255,255,0.5); }

    </style>
</head>
<body>

    <div class="system-status" id="status">Status: Offline</div>
    <div class="overlay"></div>
    <canvas id="glitch-canvas"></canvas>

    <div id="main-stage">
        <h1 class="glitch-text" id="welcome-txt" data-text="WELCOME_USER">WELCOME_USER</h1>
        
        <div id="final-ui">
            <h1 class="cyber-title">DD2_JR</h1>
            <div class="nav-box">
                <a href="#" class="cyber-btn">Enter Void</a>
                <a href="#" class="cyber-btn">Identity</a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('glitch-canvas');
        const ctx = canvas.getContext('2d');
        let w, h;

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.onresize = init;
        init();

        function drawDebris() {
            if(Math.random() > 0.1) {
                ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#333';
                const x = Math.random() * w;
                const y = Math.random() * h;
                const size = Math.random() * 200;
                ctx.fillRect(x, y, size, 2);
            }
        }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0,0,w,h);
            drawDebris();
            requestAnimationFrame(loop);
        }
        loop();

        async function runSurprise() {
            const wait = (ms) => new Promise(r => setTimeout(r, ms));
            const status = document.getElementById('status');
            const welcome = document.getElementById('welcome-txt');
            const ui = document.getElementById('final-ui');

            // Fas 1: Boot up
            await wait(1000);
            status.innerText = "Status: Connecting...";
            status.style.color = "yellow";
            
            // Fas 2: Full Glitch
            for(let i=0; i<20; i++) {
                ctx.fillStyle = `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
                ctx.fillRect(Math.random()*w, Math.random()*h, Math.random()*w, Math.random()*20);
                await wait(50);
            }

            status.innerText = "Status: Online";
            status.style.color = "white";

            // Fas 3: Welcome
            welcome.style.opacity = "1";
            await wait(3000);
            welcome.style.display = "none";

            // Fas 4: Final Reveal
            ui.style.display = "block";
            setTimeout(() => ui.style.opacity = "1", 100);

            // 24/7 Random Background Glitch
            setInterval(() => {
                if(Math.random() > 0.9) {
                    ctx.clearRect(0, Math.random()*h, w, Math.random()*50);
                }
            }, 50);
        }

        runSurprise();
    </script>
</body>
</html>
