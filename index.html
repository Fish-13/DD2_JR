<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD2_JR // LIQUID</title>
    <style>
        /* TOTAL NY STIL: VITT, SILVER OCH KROM */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #e0e0e0; /* Börjar ljust silver */
            overflow: hidden; font-family: 'Syncopate', sans-serif; 
        }

        #glitch-canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* DETTA ÄR OVERLAYEN SOM GÖR ATT DET SER UT SOM GLAS */
        .glass-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
            z-index: 10; pointer-events: none;
            border: 20px solid #fff; box-sizing: border-box;
        }

        .container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; text-align: center; width: 100%;
        }

        /* WELCOME TEXT - FLYTANDE STIL */
        #welcome {
            font-size: 5vw; color: #000; letter-spacing: 40px;
            font-weight: 900; opacity: 0; text-transform: uppercase;
            transition: 1s ease;
        }

        /* FINAL UI - KROM OCH NEON BLÅ */
        #ui { display: none; flex-direction: column; align-items: center; opacity: 0; }
        
        .main-title {
            font-size: 8rem; color: #000; margin: 0;
            letter-spacing: -5px; text-transform: uppercase;
            text-shadow: 5px 5px 0px #00f0ff, -5px -5px 0px #ff007a;
            animation: move 0.2s infinite alternate;
        }

        .btn-container { margin-top: 40px; }

        .cyber-btn {
            background: #000; color: #fff; padding: 25px 50px;
            text-decoration: none; font-size: 1.2rem; font-weight: bold;
            display: inline-block; margin: 15px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.2s; border: none; letter-spacing: 3px;
        }

        .cyber-btn:hover {
            background: #00f0ff; color: #000; transform: scale(1.1);
            box-shadow: 20px 0px 0px #ff007a;
        }

        @keyframes move {
            from { transform: skew(2deg); }
            to { transform: skew(-2deg); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="glass-overlay"></div>
    <canvas id="glitch-canvas"></canvas>

    <div class="container">
        <h1 id="welcome">SYSTEM_READY</h1>
        
        <div id="ui">
            <h1 class="main-title">DD2_JR</h1>
            <div class="btn-container">
                <a href="#" class="cyber-btn">DISCORD SERVER</a>
                <a href="#" class="cyber-btn">ADD ME</a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('glitch-canvas');
        const ctx = canvas.getContext('2d');
        let w, h;

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.onresize = init;
        init();

        // Ritar slumpmässiga "kromade" linjer 24/7
        function drawLiquid() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(0, 0, w, h);
            
            for(let i=0; i<5; i++) {
                ctx.beginPath();
                ctx.lineWidth = Math.random() * 20;
                ctx.strokeStyle = Math.random() > 0.5 ? '#00f0ff' : '#ff007a';
                ctx.moveTo(Math.random() * w, 0);
                ctx.lineTo(Math.random() * w, h);
                ctx.stroke();
            }
        }

        async function start() {
            const wait = (ms) => new Promise(r => setTimeout(r, ms));
            const welcome = document.getElementById('welcome');
            const ui = document.getElementById('ui');

            // 1. ALLT BLIR HEL SVART FÖRST (Som du ville)
            document.body.style.background = "#000";
            await wait(1500);

            // 2. EXPLOSION AV GLITCH
            const glitchInterval = setInterval(drawLiquid, 50);
            document.body.style.background = "#e0e0e0";
            await wait(2000);

            // 3. WELCOME dyker upp
            welcome.style.opacity = "1";
            welcome.style.letterSpacing = "10px";
            await wait(3000);
            welcome.style.opacity = "0";
            await wait(1000);
            welcome.style.display = "none";

            // 4. FINAL UI
            ui.style.display = "flex";
            setTimeout(() => ui.style.opacity = "1", 100);

            // 24/7 "Liquid Shake"
            setInterval(() => {
                if(Math.random() > 0.9) {
                    canvas.style.transform = `translateX(${Math.random()*20-10}px)`;
                    setTimeout(() => canvas.style.transform = 'none', 30);
                }
            }, 100);
        }

        start();
    </script>
</body>
</html>
