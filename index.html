<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD2_JR | SYSTEM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>
    <canvas id="matrix"></canvas>

    <div id="chat-container" class="chat-wrapper">
        <div class="bubble glitch" data-text="ESTABLISHING CONNECTION..." id="b1">ESTABLISHING CONNECTION...</div>
        <div class="bubble glitch" data-text="DECRYPTING DATA..." id="b2">DECRYPTING DATA...</div>
        <div class="bubble glitch" data-text="ACCESSING MAIN FRAME..." id="b3">ACCESSING MAIN FRAME...</div>
    </div>

    <div id="welcome-screen" class="welcome-wrap">
        <h2 class="welcome-text zoom-effect">WELCOME</h2>
    </div>

    <div id="main-ui" class="container">
        <h1 class="main-title pulse-glow">DD2_JR</h1>
        <div class="button-group">
            <a href="YOUR_DISCORD_LINK" target="_blank" class="btn">JOIN DISCORD</a>
            <a href="#" class="btn">ADD FRIEND</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "0101";
        const fontSize = 18;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF41";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);

        const b1 = document.getElementById('b1');
        const b2 = document.getElementById('b2');
        const b3 = document.getElementById('b3');
        const chat = document.getElementById('chat-container');
        const welcome = document.getElementById('welcome-screen');
        const ui = document.getElementById('main-ui');

        // Sequence
        setTimeout(() => b1.classList.add('show'), 400);
        setTimeout(() => b2.classList.add('show'), 900);
        setTimeout(() => b3.classList.add('show'), 1400);

        setTimeout(() => {
            chat.classList.add('exit-animation');
            setTimeout(() => {
                chat.style.display = 'none';
                welcome.style.display = 'flex';
                welcome.classList.add('active');
                
                setTimeout(() => {
                    welcome.classList.remove('active');
                    welcome.classList.add('exit-animation');
                    setTimeout(() => {
                        welcome.style.display = 'none';
                        ui.style.display = 'flex';
                        ui.classList.add('ui-show');
                    }, 800);
                }, 2000);
            }, 600);
        }, 3000);
    </script>
</body>
</html>
