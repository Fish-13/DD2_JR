<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD2_JR | TERMINAL</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* THE VISUAL GLITCH (Slices and Colors) */
        .full-glitch {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: none;
        }
        .full-glitch::before, .full-glitch::after {
            content: "CRITICAL_ERROR"; /* Placeholder text to create visual noise */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: #f00; font-size: 10vw; display: flex;
            justify-content: center; align-items: center;
        }
        .full-glitch::before {
            left: 2px; text-shadow: -5px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 0.2s infinite linear alternate-reverse;
        }
        .full-glitch::after {
            left: -2px; text-shadow: -5px 0 #00fff9, 5px 5px #ff00c1;
            animation: glitch-anim2 0.3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); transform: skew(0.85deg); }
            20% { clip: rect(62px, 9999px, 42px, 0); transform: skew(0.6deg); }
            40% { clip: rect(13px, 9999px, 86px, 0); transform: skew(0.3deg); }
            60% { clip: rect(89px, 9999px, 98px, 0); transform: skew(0.1deg); }
            80% { clip: rect(4px, 9999px, 12px, 0); transform: skew(0.4deg); }
            100% { clip: rect(52px, 9999px, 76px, 0); transform: skew(0.9deg); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(10px, 9999px, 85px, 0); transform: translateX(10px); }
            50% { clip: rect(80px, 9999px, 15px, 0); transform: translateX(-10px) rotate(1deg); background: rgba(255,0,0,0.2); }
            100% { clip: rect(40px, 9999px, 90px, 0); transform: translateX(5px); }
        }

        /* Matrix Canvas */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0; transition: opacity 2s; }

        /* UI Elements */
        .content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; width: 100%; color: #0f0;
        }
        #welcome { font-size: 5vw; display: none; letter-spacing: 10px; text-shadow: 0 0 10px #0f0; }
        #ui { display: none; flex-direction: column; align-items: center; }
        .title { font-size: 5rem; margin-bottom: 20px; }
        .btn {
            padding: 15px 30px; border: 1px solid #0f0; color: #0f0; text-decoration: none;
            background: rgba(0,0,0,0.8); margin: 10px; transition: 0.3s;
        }
        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; }
    </style>
</head>
<body>
    <div id="visual-glitch" class="full-glitch"></div>
    <canvas id="matrix"></canvas>

    <div class="content">
        <h1 id="welcome">WELCOME USER</h1>
        <div id="ui">
            <h1 class="title">DD2_JR</h1>
            <a href="#" class="btn">JOIN DISCORD</a>
            <a href="#" class="btn">ADD FRIEND</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 18)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "18px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", i * 18, y * 18);
                if (y * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);

        const wait = (ms) => new Promise(res => setTimeout(res, ms));

        async function runSystem() {
            const glitch = document.getElementById('visual-glitch');
            const welcome = document.getElementById('welcome');
            const ui = document.getElementById('ui');

            // 1. START BLACK (1s)
            await wait(1000);

            // 2. CRAZY FULL SCREEN GLITCH (Rapid bursts)
            glitch.style.display = 'block';
            await wait(300); glitch.style.display = 'none';
            await wait(100); glitch.style.display = 'block';
            await wait(600); glitch.style.display = 'none';

            // 3. MATRIX FADE IN
            canvas.style.opacity = "1";
            await wait(1000);

            // 4. WELCOME USER
            welcome.style.display = 'block';
            await wait(2000);
            welcome.style.display = 'none';

            // 5. FINAL UI
            ui.style.display = 'flex';
        }

        runSystem();
    </script>
</body>
</html>
