<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD2_JR // OVERDRIVE</title>
    <style>
        /* TOTAL NY DESIGN - INGET MATRIX */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #0d001a; /* Mörklila bas */
            color: #fff; font-family: 'Avenir', 'Helvetica', sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* RETRO GRID BAKGRUND */
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 0, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center bottom;
            animation: moveGrid 2s linear infinite;
            z-index: 1;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 50px; }
        }

        /* GLÖDANDE SOL */
        .sun {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 600px;
            background: linear-gradient(#ff0080, #ff8c00);
            border-radius: 50%;
            box-shadow: 0 0 100px #ff0080;
            z-index: 0;
        }

        .content {
            position: relative; z-index: 10; text-align: center;
        }

        /* INTRO SEKVENSS */
        #blackout {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; transition: opacity 1s;
        }

        /* TITEL - DD2_JR */
        .main-name {
            font-size: 10vw; font-weight: 900; font-style: italic;
            text-transform: uppercase; margin: 0;
            background: linear-gradient(#00f2ff, #006aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px #00f2ff);
            letter-spacing: -5px;
        }

        .links { margin-top: 50px; display: flex; gap: 20px; justify-content: center; }

        .btn {
            padding: 20px 40px; border: none; font-weight: bold;
            text-transform: uppercase; cursor: pointer; text-decoration: none;
            background: #fff; color: #000; letter-spacing: 2px;
            transition: 0.3s; clip-path: polygon(15% 0%, 100% 0%, 85% 100%, 0% 100%);
        }

        .btn:hover {
            background: #ff0080; color: #fff;
            transform: scale(1.1) rotate(-3deg);
            box-shadow: 0 0 50px #ff0080;
        }

    </style>
</head>
<body>

    <div id="blackout"></div>
    <div class="grid-bg"></div>
    <div class="sun"></div>

    <div class="content">
        <h1 class="main-name">DD2_JR</h1>
        <div class="links">
            <a href="DIN_DISCORD_LÄNK" class="btn">Discord Server</a>
            <a href="DIN_PROFIL_LÄNK" class="btn">Add Friend</a>
        </div>
    </div>

    <script>
        // Startsekvens: Allt är svart, sen tonas allt in
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('blackout').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('blackout').style.display = 'none';
                }, 1000);
            }, 1000);
        };

        // Enkel slumpmässig "jitter" effekt på titeln bara för att det ska leva lite
        setInterval(() => {
            if(Math.random() > 0.98) {
                document.querySelector('.main-name').style.transform = `translateX(${Math.random()*10-5}px)`;
                setTimeout(() => {
                    document.querySelector('.main-name').style.transform = 'none';
                }, 50);
            }
        }, 100);
    </script>
</body>
</html>
