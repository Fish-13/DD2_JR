<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_CRITICAL</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* KAOTISK FULLSCREEN GLITCH */
        #hacker-glitch {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999; display: none; background: #000;
        }

        .glitch-bar {
            position: absolute; width: 100%; 
            opacity: 0.9;
            filter: brightness(1.5);
        }

        /* MATRIX REGN */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0; transition: opacity 3s; }

        /* TEXT LAYERS */
        .layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; color: #0f0; width: 100%;
        }
        
        /* COOL WELCOME EFFEKT */
        #welcome { 
            font-size: 7vw; 
            display: none; 
            letter-spacing: 25px; 
            text-shadow: 0 0 20px #0f0, 0 0 40px #0f0;
            opacity: 0;
            transition: all 1.5s ease-out;
            transform: scale(0.5);
        }

        .welcome-active {
            opacity: 1 !important;
            transform: scale(1.1) !important;
            letter-spacing: 15px !important;
        }
        
        #ui { display: none; flex-direction: column; align-items: center; opacity: 0; transition: opacity 2s; }
        .title { font-size: 6rem; text-shadow: 0 0 20px #0f0; margin-bottom: 30px; letter-spacing: 20px; }
        
        .btn {
            padding: 18px 35px; border: 1px solid #0f0; color: #0f0; text-decoration: none;
            background: rgba(0,0,0,0.8); margin: 10px; transition: 0.4s; font-weight: bold;
            text-transform: uppercase; letter-spacing: 3px;
        }
        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 40px #0f0; transform: scale(1.05); }

    </style>
</head>
<body>
    <div id="hacker-glitch"></div>
    <canvas id="matrix"></canvas>

    <div class="layer">
        <h1 id="welcome">WELCOME USER</h1>
        <div id="ui">
            <h1 class="title">DD2_JR</h1>
            <div class="btns">
                <a href="#" class="btn">Join Discord</a>
                <a href="#" class="btn">Add Friend</a>
            </div>
        </div>
    </div>

    <script>
        const glitchBox = document.getElementById('hacker-glitch');
        
        // Skapar de kaotiska färgstrecken
        function createGlitchBars(intensity) {
            glitchBox.innerHTML = '';
            for(let i = 0; i < intensity; i++) {
                let bar = document.createElement('div');
                bar.className = 'glitch-bar';
                bar.style.top = Math.random() * 100 + 'vh';
                bar.style.left = (Math.random() * 10 - 5) + 'vw';
                bar.style.width = (Math.random() * 110) + 'vw';
                bar.style.height = Math.random() * 80 + 'px';
                const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffffff', '#ff00ff', '#ffff00'];
                bar.style.background = colors[Math.floor(Math.random() * colors.length)];
                if(Math.random() > 0.5) bar.style.filter = 'blur(5px)';
                glitchBox.appendChild(bar);
            }
        }

        // MATRIX LOGIK
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 18)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "18px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", i * 18, y * 18);
                if (y * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);

        // DEN LÅNGA SEKVENSSEN
        async function runSystem() {
            const wait = (ms) => new Promise(res => setTimeout(res, ms));

            // 1. START SVART
            await wait(1500);

            // 2. LÅNG KAOTISK GLITCH (Utdragen i flera steg)
            glitchBox.style.display = 'block';
            
            // Del 1: Små störningar
            for(let i = 0; i < 8; i++) {
                createGlitchBars(5);
                await wait(100);
            }
            // Del 2: TOTALT KAOS (Skärmen dör nästan)
            for(let i = 0; i < 15; i++) {
                createGlitchBars(40);
                await wait(60);
            }
            // Del 3: Sista ryckningarna
            for(let i = 0; i < 5; i++) {
                createGlitchBars(10);
                await wait(200);
            }
            
            glitchBox.style.display = 'none';

            // 3. TILLBAKA TILL TOTALT SVART
            await wait(2000);

            // 4. MATRIX REGNET BÖRJAR SAKTA
            canvas.style.opacity = "1";
            await wait(1500);

            // 5. COOL WELCOME USER (Glider fram ur mörkret)
            const welcome = document.getElementById('welcome');
            welcome.style.display = 'block';
            await wait(100);
            welcome.classList.add('welcome-active');
            
            await wait(3500); // Låter welcome stå kvar ett tag
            
            welcome.style.opacity = '0';
            welcome.style.transform = 'scale(2) blur(20px)';
            await wait(1500);
            welcome.style.display = 'none';

            // 6. DD2_JR FINAL UI
            const ui = document.getElementById('ui');
            ui.style.display = 'flex';
            await wait(100);
            ui.style.opacity = '1';
        }

        runSystem();
    </script>
</body>
</html>
