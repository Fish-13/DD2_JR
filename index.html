<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_FAILURE</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* CRT & NOISE FILTER */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            z-index: 100; pointer-events: none;
        }

        /* REAL DIGITAL GLITCH */
        #glitch-trigger {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: none;
        }
        .noise {
            width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUPr9WvA8PPmW/giphy.gif'); /* Digital statics */
            opacity: 0.2; position: absolute;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0; transition: opacity 0.5s; }

        .content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; color: #0f0;
        }
        
        #welcome { font-size: 6vw; display: none; text-shadow: 2px 0 red, -2px 0 blue; animation: shake 0.1s infinite; }
        #ui { display: none; flex-direction: column; align-items: center; }
        .title { font-size: 5rem; text-shadow: 0 0 20px #0f0; }
        
        @keyframes shake {
            0% { transform: translate(2px, 1px); }
            50% { transform: translate(-2px, -1px) scale(1.01); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="glitch-trigger"><div class="noise"></div></div>
    <canvas id="matrix"></canvas>

    <div class="content">
        <h1 id="welcome">WELCOME USER</h1>
        <div id="ui">
            <h1 class="title">DD2_JR</h1>
            <a href="#" style="color:#0f0; border:1px solid #0f0; padding:10px; text-decoration:none;">JOIN SYSTEM</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 18)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "18px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", i * 18, y * 18);
                if (y * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        async function run() {
            const g = document.getElementById('glitch-trigger');
            const w = document.getElementById('welcome');
            const ui = document.getElementById('ui');

            await new Promise(r => setTimeout(r, 1000)); // Black
            
            // Bursts of glitch
            g.style.display = 'block'; await new Promise(r => setTimeout(r, 200));
            g.style.display = 'none'; await new Promise(r => setTimeout(r, 100));
            g.style.display = 'block'; await new Promise(r => setTimeout(r, 500));
            g.style.display = 'none';

            canvas.style.opacity = "1";
            w.style.display = 'block';
            await new Promise(r => setTimeout(r, 2000));
            w.style.display = 'none';
            ui.style.display = 'flex';
        }
        run();
    </script>
</body>
</html>
