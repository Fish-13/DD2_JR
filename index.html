<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD2_JR | SYSTEM</title>
    <style>
        /* ALL DESIGN HÄR */
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; z-index: 100; pointer-events: none;
        }

        .content-layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; width: 100%;
        }

        /* Bubbles */
        .bubble {
            background: rgba(0, 40, 0, 0.9); border: 2px solid #00FF41; color: #00FF41;
            padding: 15px 25px; margin: 10px auto; width: fit-content;
            border-radius: 10px; box-shadow: 0 0 15px #00FF41;
            display: none; animation: popIn 0.4s forwards;
        }

        /* Welcome Text */
        #welcome { 
            font-size: 8vw; color: #00FF41; letter-spacing: 20px; 
            display: none; text-shadow: 0 0 30px #00FF41;
        }

        /* Main UI */
        #ui { display: none; flex-direction: column; align-items: center; }
        .title { font-size: 6rem; color: #00FF41; text-shadow: 0 0 20px #00FF41; margin-bottom: 40px; }
        .btn {
            padding: 15px 35px; border: 2px solid #00FF41; color: #00FF41;
            text-decoration: none; background: rgba(0,0,0,0.8); transition: 0.3s;
            font-weight: bold; margin: 10px; display: inline-block;
        }
        .btn:hover { background: rgba(0, 255, 65, 0.2); box-shadow: 0 0 30px #00FF41; }

        /* Animations */
        @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes zoomOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(3); filter: blur(20px); } }
        .zoom-away { animation: zoomOut 0.8s forwards; }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <canvas id="matrix"></canvas>

    <div class="content-layer">
        <div id="b1" class="bubble">CONNECTING TO DATABASE...</div>
        <div id="b2" class="bubble">LOADING SYSTEM...</div>
        <div id="b3" class="bubble">DECRYPTING...</div>

        <h1 id="welcome">WELCOME</h1>

        <div id="ui">
            <h1 class="title">DD2_JR</h1>
            <div class="btns">
                <a href="#" class="btn">JOIN DISCORD</a>
                <a href="#" class="btn">ADD FRIEND</a>
            </div>
        </div>
    </div>

    <script>
        // MATRIX RAIN
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 18)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = "18px monospace";
            drops.forEach((y, i) => {
                const text = Math.random() > 0.5 ? "0" : "1";
                ctx.fillText(text, i * 18, y * 18);
                if (y * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);

        // SEQUENCING (The Crazy Part)
        const wait = (ms) => new Promise(res => setTimeout(res, ms));

        async function runIntro() {
            // Show Bubbles
            document.getElementById('b1').style.display = 'block';
            await wait(800);
            document.getElementById('b2').style.display = 'block';
            await wait(800);
            document.getElementById('b3').style.display = 'block';
            await wait(1500);

            // Transition to Welcome
            document.getElementById('b1').style.display = 'none';
            document.getElementById('b2').style.display = 'none';
            document.getElementById('b3').style.display = 'none';
            
            const w = document.getElementById('welcome');
            w.style.display = 'block';
            await wait(1500);
            w.classList.add('zoom-away');
            await wait(600);
            w.style.display = 'none';

            // Show UI
            document.getElementById('ui').style.display = 'flex';
        }

        runIntro();
    </script>
</body>
</html>
