<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD2_JR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix"></canvas>

    <div id="chat-container" class="chat-wrapper">
        <div class="bubble" id="b1">Initializing system...</div>
        <div class="bubble" id="b2">Loading database...</div>
        <div class="bubble" id="b3">Bypassing firewall...</div>
    </div>

    <div id="welcome-screen" class="exchange-screen">
        <h2 class="welcome-text">WELCOME</h2>
    </div>

    <div id="main-ui" class="container">
        <h1 class="main-title">DD2_JR</h1>
        <div class="button-group">
            <a href="YOUR_DISCORD_LINK" target="_blank" class="btn">JOIN DISCORD SERVER</a>
            <a href="#" class="btn">ADD DD2_JR</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "0101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);

        // Animation Sequence (The "Exchange")
        const b1 = document.getElementById('b1');
        const b2 = document.getElementById('b2');
        const b3 = document.getElementById('b3');
        const chat = document.getElementById('chat-container');
        const welcome = document.getElementById('welcome-screen');
        const ui = document.getElementById('main-ui');

        setTimeout(() => b1.classList.add('show'), 500);
        setTimeout(() => b2.classList.add('show'), 1200);
        setTimeout(() => b3.classList.add('show'), 1900);

        setTimeout(() => {
            chat.classList.add('fade-out');
            setTimeout(() => {
                chat.style.display = 'none';
                welcome.classList.add('fade-in');
                
                setTimeout(() => {
                    welcome.classList.replace('fade-in', 'fade-out');
                    setTimeout(() => {
                        welcome.style.display = 'none';
                        ui.classList.add('fade-in');
                    }, 800);
                }, 1500);
            }, 800);
        }, 3500);
    </script>
</body>
</html>
