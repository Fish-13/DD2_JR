<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_STABLE_VOID</title>
    <style>
        /* INGA BLIXTAR - BARA MÖRKER */
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'serif', serif; }

        /* LUGN STATISK EFFEKT */
        .static-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUPr9WvA8PPmW/giphy.gif');
            opacity: 0.05; z-index: 100; pointer-events: none;
        }

        /* STATISKA GLITCH-BARER (Inga snabba rörelser) */
        #glitch-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 99; pointer-events: none;
        }

        .glitch-bar {
            position: absolute; width: 100%; 
            background: rgba(80, 0, 0, 0.4);
            border-top: 1px solid #500;
        }

        /* MÖRK RÖD MATRIX */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; filter: brightness(0.5); }

        .content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; width: 100%;
        }

        #welcome { 
            font-size: 6vw; color: #666; display: none;
            letter-spacing: 20px; text-shadow: 2px 2px #300;
            text-transform: uppercase;
        }

        #ui { display: none; flex-direction: column; align-items: center; }
        
        .title { 
            font-size: 7rem; color: #8b0000; 
            text-shadow: 0 0 15px #400;
            letter-spacing: 12px;
            margin-bottom: 30px;
        }

        .btns { display: flex; align-items: center; gap: 30px; }

        .btn {
            padding: 15px 45px; border: 1px solid #333; color: #8b0000; 
            text-decoration: none; background: #050505;
            font-weight: bold; transition: 0.3s ease;
            text-transform: uppercase; letter-spacing: 5px;
        }

        .btn:hover { 
            background: #200; color: #f00; 
            border-color: #f00;
            box-shadow: 0 0 20px #500;
        }

        /* GITHUB LOGO */
        .github-btn {
            fill: #500;
            transition: 0.4s ease;
        }

        .github-btn:hover {
            fill: #f00;
            filter: drop-shadow(0 0 15px #f00);
        }
    </style>
</head>
<body>
    <div class="static-overlay"></div>
    <div id="glitch-layer"></div>
    <canvas id="matrix"></canvas>

    <div class="content">
        <h1 id="welcome">Establishing Connection...</h1>
        <div id="ui">
            <h1 class="title">DD2_JR</h1>
            <div class="btns">
                <a href="DIN_DISCORD_LÄNK" class="btn">DISCORD</a>
                
                <a href="https://github.com/DITT_ANVÄNDARNAMN" target="_blank" class="github-btn">
                    <svg height="60" viewBox="0 0 16 16" width="60">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <script>
        const glitchLayer = document.getElementById('glitch-layer');
        
        // Mycket långsammare och lugnare glitchar
        function slowGlitch() {
            glitchLayer.innerHTML = '';
            if (Math.random() > 0.9) { 
                for(let i=0; i<3; i++) {
                    let slice = document.createElement('div');
                    slice.className = 'glitch-bar';
                    slice.style.top = Math.random() * 100 + 'vh';
                    slice.style.height = Math.random() * 50 + 'px';
                    glitchLayer.appendChild(slice);
                }
            }
        }
        setInterval(slowGlitch, 500); // Bara en koll var halvsekund

        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#400"; // Mörkare röd
            ctx.font = "20px serif";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 60);

        async function sequence() {
            const wait = (ms) => new Promise(r => setTimeout(r, ms));
            await wait(1000); 
            document.getElementById('welcome').style.display = 'block';
            await wait(2500);
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
        }
        sequence();
    </script>
</body>
</html>
