<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD2_JR | SYSTEM</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #0f0; }
        
        /* CRT/Old Filter */
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%; z-index: 100; pointer-events: none;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0; transition: opacity 1s; }

        /* Glitch Phase */
        #glitch-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; justify-content: center; align-items: center;
            z-index: 50; color: #f00; font-size: 5vw; font-weight: bold;
            text-shadow: 2px 2px #fff, -2px -2px #f00;
        }

        .glitch-anim { animation: glitchSkew 0.2s infinite; }

        /* Content Layer */
        .content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; width: 100%;
        }

        #welcome { font-size: 6vw; display: none; text-shadow: 0 0 20px #0f0; letter-spacing: 15px; }
        #ui { display: none; flex-direction: column; align-items: center; }
        .title { font-size: 5rem; text-shadow: 0 0 15px #0f0; margin-bottom: 30px; }
        .btn {
            padding: 15px 30px; border: 2px solid #0f0; color: #0f0; text-decoration: none;
            background: rgba(0,0,0,0.5); transition: 0.3s; margin: 10px; display: inline-block;
        }
        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 30px #0f0; }

        /* Keyframes */
        @keyframes glitchSkew {
            0% { transform: skew(20deg); opacity: 0.8; }
            50% { transform: skew(-20deg); border: 5px solid red; opacity: 1; }
            100% { transform: skew(10deg); opacity: 0.5; }
        }
        .fade-out { animation: fadeOut 0.8s forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: translate(-50%, -60%); } }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div id="glitch-screen" class="glitch-anim">SYSTEM CRITICAL ERROR: UNAUTHORIZED ACCESS</div>
    <canvas id="matrix"></canvas>

    <div class="content">
        <h1 id="welcome">WELCOME USER</h1>
        <div id="ui">
            <h1 class="title">DD2_JR</h1>
            <div class="btns">
                <a href="#" class="btn">JOIN DISCORD</a>
                <a href="#" class="btn">ADD FRIEND</a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 18)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "18px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", i * 18, y * 18);
                if (y * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);

        const wait = (ms) => new Promise(res => setTimeout(res, ms));

        async function startSystem() {
            const glitch = document.getElementById('glitch-screen');
            const welcome = document.getElementById('welcome');
            const ui = document.getElementById('ui');

            // 1. ALL BLACK
            await wait(1000);

            // 2. CRAZY GLITCH (The red part from your screenshot)
            glitch.style.display = 'flex';
            await wait(400); glitch.style.display = 'none';
            await wait(100); glitch.style.display = 'flex';
            await wait(800); glitch.style.display = 'none';

            // 3. BLACK & MATRIX RAIN STARTS
            await wait(500);
            canvas.style.opacity = "1";
            await wait(1000);

            // 4. WELCOME USER
            welcome.style.display = 'block';
            await wait(2000);
            welcome.classList.add('fade-out');
            await wait(800);
            welcome.style.display = 'none';

            // 5. FINAL UI
            ui.style.display = 'flex';
        }

        startSystem();
    </script>
</body>
</html>
