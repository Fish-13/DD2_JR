<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_STAY_AWAY</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'serif', serif; }

        /* CONSTANT NOISE FILTER */
        .static-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUPr9WvA8PPmW/giphy.gif');
            opacity: 0.07; z-index: 100; pointer-events: none;
        }

        /* THE NEVER-ENDING GLITCH */
        #glitch-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 99; pointer-events: none;
        }

        .glitch-bar {
            position: absolute; width: 100%; 
            background: rgba(139, 0, 0, 0.6);
            box-shadow: 0 0 10px #ff0000;
        }

        /* BLOODY MATRIX */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; filter: contrast(1.5) brightness(0.8); }

        .content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; width: 100%;
        }

        /* HAUNTED TEXT 24/7 */
        #welcome { 
            font-size: 7vw; color: #eee; display: none;
            letter-spacing: 15px; text-shadow: 4px 0 #8b0000, -4px 0 #333;
            animation: infinite-shake 0.05s infinite;
        }

        #ui { display: none; flex-direction: column; align-items: center; }
        
        .title { 
            font-size: 6rem; color: #8b0000; 
            text-shadow: 0 0 20px #ff0000;
            animation: infinite-shake 0.1s infinite;
            letter-spacing: 10px;
        }

        .btn {
            padding: 15px 40px; border: 1px solid #444; color: #8b0000; 
            text-decoration: none; background: rgba(0,0,0,0.85); margin: 15px; 
            font-weight: bold; transition: 0.05s;
            text-transform: uppercase; letter-spacing: 5px;
            display: inline-block;
        }

        .btn:hover { 
            background: #ff0000; color: #000; 
            box-shadow: 0 0 50px #ff0000;
            transform: scale(1.1) rotate(2deg);
        }

        /* KEYFRAMES FOR CONSTANT SHAKING */
        @keyframes infinite-shake {
            0% { transform: translate(2px, 2px) skew(2deg); }
            25% { transform: translate(-2px, -2px) skew(-3deg); }
            50% { transform: translate(3px, -1px) clip-path: inset(10% 0 20% 0); }
            75% { transform: translate(-3px, 3px) skew(1deg); }
            100% { transform: translate(1px, -2px); }
        }
    </style>
</head>
<body>
    <div class="static-overlay"></div>
    <div id="glitch-layer"></div>
    <canvas id="matrix"></canvas>

    <div class="content">
        <h1 id="welcome">WELCOME...</h1>
        <div id="ui">
            <h1 class="title">DD2_JR</h1>
            <div class="btns">
                <a href="#" class="btn">JOIN SERVER</a>
                <a href="#" class="btn">HELP ME</a>
            </div>
        </div>
    </div>

    <script>
        const glitchLayer = document.getElementById('glitch-layer');
        
        // Denna funktion körs hela tiden för att skapa nya "fel" på skärmen
        function permanentGlitch() {
            glitchLayer.innerHTML = '';
            if (Math.random() > 0.7) { // 30% chans varje gång för en stor störning
                for(let i=0; i<15; i++) {
                    let slice = document.createElement('div');
                    slice.className = 'glitch-bar';
                    slice.style.top = Math.random() * 100 + 'vh';
                    slice.style.height = Math.random() * 30 + 'px';
                    slice.style.background = Math.random() > 0.5 ? '#8b0000' : '#fff';
                    slice.style.left = (Math.random() * 4 - 2) + 'vw';
                    glitchLayer.appendChild(slice);
                }
            }
            // Slumpmässig skärm-flash
            document.body.style.filter = Math.random() > 0.98 ? 'invert(1)' : 'none';
        }
        setInterval(permanentGlitch, 50); // Uppdaterar glitchen var 50:e millisekund

        // RED MATRIX
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "20px serif";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 40);

        async function sequence() {
            const wait = (ms) => new Promise(r => setTimeout(r, ms));
            const welcome = document.getElementById('welcome');
            const ui = document.getElementById('ui');

            await wait(2000); // Svart start
            canvas.style.opacity = "0.5";
            
            welcome.style.display = 'block';
            await wait(3000);
            welcome.style.display = 'none';

            ui.style.display = 'flex';
        }

        sequence();
    </script>
</body>
</html>
