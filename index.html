<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_FAILURE</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* KAOTISK FULLSCREEN GLITCH */
        #hacker-glitch {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999; display: none; background: #000;
        }

        .glitch-bar {
            position: absolute; width: 100%; height: 10px;
            background: linear-gradient(90deg, transparent, #ff0000, #00ff00, #0000ff, transparent);
            opacity: 0.8;
        }

        /* MATRIX REGN */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0; transition: opacity 2s; }

        /* TEXT LAYERS */
        .layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; color: #0f0; width: 100%;
        }
        
        #welcome { font-size: 6vw; display: none; letter-spacing: 10px; text-shadow: 0 0 15px #0f0; }
        
        #ui { display: none; flex-direction: column; align-items: center; }
        .title { font-size: 5rem; text-shadow: 0 0 20px #0f0; margin-bottom: 30px; letter-spacing: 15px; }
        
        .btn {
            padding: 15px 30px; border: 1px solid #0f0; color: #0f0; text-decoration: none;
            background: rgba(0,0,0,0.8); margin: 10px; transition: 0.3s; font-weight: bold;
        }
        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 30px #0f0; }

    </style>
</head>
<body>
    <div id="hacker-glitch"></div>
    <canvas id="matrix"></canvas>

    <div class="layer">
        <h1 id="welcome">WELCOME USER</h1>
        <div id="ui">
            <h1 class="title">DD2_JR</h1>
            <div class="btns">
                <a href="#" class="btn">JOIN DISCORD</a>
                <a href="#" class="btn">ADD FRIEND</a>
            </div>
        </div>
    </div>

    <script>
        const glitchBox = document.getElementById('hacker-glitch');
        
        // Skapar slumpmässiga färgstreck för "hacker-glitchen"
        function createGlitchBars() {
            for(let i = 0; i < 20; i++) {
                let bar = document.createElement('div');
                bar.className = 'glitch-bar';
                bar.style.top = Math.random() * 100 + 'vh';
                bar.style.left = (Math.random() * 20 - 10) + 'vw';
                bar.style.height = Math.random() * 50 + 'px';
                bar.style.background = `rgba(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255}, 0.8)`;
                glitchBox.appendChild(bar);
            }
        }

        // MATRIX LOGIK
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 18)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "18px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", i * 18, y * 18);
                if (y * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);

        // DEN STORA SEKVENSSEN
        async function runSystem() {
            const wait = (ms) => new Promise(res => setTimeout(res, ms));

            // 1. ALLT SVART (1 sek)
            await wait(1000);

            // 2. CRAZY HACKER GLITCH (Färger överallt)
            glitchBox.style.display = 'block';
            for(let i = 0; i < 5; i++) {
                createGlitchBars();
                await wait(100);
                glitchBox.innerHTML = ''; // Rensar och gör om för kaos-effekt
            }
            glitchBox.style.display = 'none';

            // 3. TILLBAKA TILL SVART... sen Matrix tonas in
            await wait(800);
            canvas.style.opacity = "1";
            await wait(1000);

            // 4. WELCOME USER
            const welcome = document.getElementById('welcome');
            welcome.style.display = 'block';
            await wait(2500);
            welcome.style.display = 'none';

            // 5. DD2_JR FINAL UI
            document.getElementById('ui').style.display = 'flex';
        }

        runSystem();
    </script>
</body>
</html>
