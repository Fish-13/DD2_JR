<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD2_JR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix"></canvas>

    <div id="loader" class="overlay-text">LOADING DATABASE...</div>

    <div id="welcome" class="overlay-text" style="display: none;">WELCOME</div>

    <div id="ui" class="container" style="display: none;">
        <h1 class="main-title">DD2_JR</h1>
        <div class="button-group">
            <a href="YOUR_DISCORD_LINK" target="_blank" class="btn">JOIN DISCORD SERVER</a>
            <a href="YOUR_DISCORD_PROFILE_LINK" target="_blank" class="btn">ADD DD2_JR</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "01010101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        // Timing Sequence
        setInterval(draw, 33);

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('welcome').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('welcome').style.display = 'none';
                document.getElementById('ui').style.display = 'flex';
            }, 2000); // Welcome shows for 2 sec
        }, 3000); // Loading shows for 3 sec
    </script>
</body>
</html>
